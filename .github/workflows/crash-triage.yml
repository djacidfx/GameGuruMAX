name: Crash Triage (WinDbg)

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  triage:
    if: >
      (github.event.action == 'labeled' && github.event.label.name == 'crash-triage') ||
      (github.event.action == 'opened' && contains(
        join(github.event.issue.labels.*.name, ','),
        'crash-triage'
      ))
    runs-on: [self-hosted, Windows, crashtriage]

    steps:
      - name: Prepare workspace
        shell: powershell
        run: |
          $root = Join-Path $env:RUNNER_TEMP "crashtriage"
          New-Item -ItemType Directory -Force -Path $root | Out-Null
          "CRASHTRIAGE_ROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Fetch issue body and comments
        id: issue_text
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repo = "${{ github.repository }}"
          $num  = "${{ github.event.issue.number }}"

          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            "User-Agent"  = "crash-triage"
          }

          $issue = Invoke-RestMethod "https://api.github.com/repos/$repo/issues/$num" -Headers $headers
          $comments = Invoke-RestMethod "https://api.github.com/repos/$repo/issues/$num/comments" -Headers $headers

          $text = $issue.body
          foreach ($c in $comments) { $text += "`n`n" + $c.body }

          $out = Join-Path $env:CRASHTRIAGE_ROOT "issue.txt"
          Set-Content $out $text -Encoding UTF8
          "issue_text=$out" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Download crashdump and log
        id: dl
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $text = Get-Content "${{ steps.issue_text.outputs.issue_text }}" -Raw

          $dmp = [regex]::Match($text, '(https://\S+?\.dmp)\b').Value
          $log = [regex]::Match($text, '(https://\S+?Guru-Crash\.log)\b').Value

          if (-not $dmp) { throw "Missing .dmp link" }
          if (-not $log) { throw "Missing Guru-Crash.log link" }

          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            "User-Agent"  = "crash-triage"
          }

          $dmpPath = Join-Path $env:CRASHTRIAGE_ROOT "crashdump.dmp"
          $logPath = Join-Path $env:CRASHTRIAGE_ROOT "Guru-Crash.log"

          Invoke-WebRequest $dmp -Headers $headers -OutFile $dmpPath
          Invoke-WebRequest $log -Headers $headers -OutFile $logPath

          "dmp=$dmpPath" | Out-File $env:GITHUB_OUTPUT -Append
          "log=$logPath" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Parse timestamp and offset (LAST crash entry)
        id: parse
        shell: powershell
        run: |
          $logText = Get-Content "${{ steps.dl.outputs.log }}" -Raw

          # Split into blocks; keep only blocks that look like crash entries
          $blocks = @(
            ($logText -split '==== GAMEGURU MAX CRASH DETECTED ====') |
              ForEach-Object { $_.Trim() } |
              Where-Object { $_ -match 'Build:\s*GameGuru\s*MAX\s*Build' }
          )                    

          if (-not $blocks -or $blocks.Count -eq 0) {
            throw "No crash blocks found in Guru-Crash.log"
          }

          $last = $blocks[-1]

          $ts = [regex]::Match($last, 'Build:\s*GameGuru\s*MAX\s*Build\s*([0-9\-]{16})').Groups[1].Value
          $off = [regex]::Match($last, 'Offset\s*value:\s*(0x[0-9a-fA-F]+)').Groups[1].Value
          $crashAddr  = [regex]::Match($last, 'Crash\s*address:\s*(0x[0-9a-fA-F]+)').Groups[1].Value
          $moduleAddr = [regex]::Match($last, 'Module\s*address:\s*(0x[0-9a-fA-F]+)').Groups[1].Value

          if (-not $ts)  { throw "Build timestamp not found in LAST crash block.`n$last" }
          if (-not $off) { throw "Offset value not found in LAST crash block.`n$last" }

          "ts=$ts" | Out-File $env:GITHUB_OUTPUT -Append
          "off=$off" | Out-File $env:GITHUB_OUTPUT -Append
          "crash_addr=$crashAddr" | Out-File $env:GITHUB_OUTPUT -Append
          "module_addr=$moduleAddr" | Out-File $env:GITHUB_OUTPUT -Append   

      - name: Stage EXE and PDB
        id: stage
        shell: powershell
        run: |
          $store = "D:\DEV\BUILDS\GameGuru Wicked MAX PDBs"
          Write-Host "Store is: $store"

          $ts = "${{ steps.parse.outputs.ts }}"
          Write-Host "Looking for: GameGuruMAX_$ts.exe and .pdb"

          $exeName = "GameGuruMAX_$ts.exe"
          $pdbName = "GameGuruMAX_$ts.pdb"

          $exeItem = Get-ChildItem -Path $store -Recurse -File -Filter $exeName -ErrorAction SilentlyContinue | Select-Object -First 1
          $pdbItem = Get-ChildItem -Path $store -Recurse -File -Filter $pdbName -ErrorAction SilentlyContinue | Select-Object -First 1

          if (-not $exeItem) { throw "EXE not found anywhere under: $store (wanted $exeName)" }
          if (-not $pdbItem) { throw "PDB not found anywhere under: $store (wanted $pdbName)" }

          $work = Join-Path $env:CRASHTRIAGE_ROOT "work"
          New-Item -ItemType Directory -Force -Path $work | Out-Null

          Copy-Item $exeItem.FullName (Join-Path $work "GameGuruMAX.exe") -Force
          Copy-Item $pdbItem.FullName (Join-Path $work "GameGuruMAX.pdb") -Force

          "work=$work" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Run CDB
        id: dbg
        shell: powershell
        run: |
          $cdb  = "C:\Program Files (x86)\Windows Kits\10\Debuggers\x64\cdb.exe"
          $dmp  = "${{ steps.dl.outputs.dmp }}"
          $work = "${{ steps.stage.outputs.work }}"
          $out  = Join-Path $work "resolve.txt"
          $cmdFile = Join-Path $work "cmd.txt"
      
          # Single pass: resolve crash site via exception context (no module name assumptions)
          @(
            ".symfix",
            ".sympath+ $work",
            "!sym noisy",
            ".reload /f",
            ".lastevent",
            ".ecxr",
            ".lines",
            "ln @rip",
            "u @rip L20",
            "kv",
            "q"
          ) | Set-Content -Path $cmdFile -Encoding ASCII
      
          & $cdb -z "$dmp" -cf "$cmdFile" *> $out
      
          "out=$out" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Upload triage output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crash-triage-output
          path: |
            ${{ steps.dbg.outputs.out }}

      - name: Comment result
        if: always()
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repo = "${{ github.repository }}"
          $num  = "${{ github.event.issue.number }}"
          $api  = "https://api.github.com/repos/$repo/issues/$num/comments"

          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            "User-Agent"  = "crash-triage"
            "Accept"      = "application/vnd.github+json"
          }

          if ("${{ job.status }}" -eq "success") {

            $txt = Get-Content "${{ steps.dbg.outputs.out }}" -Raw
            $lines = $txt -split "`r?`n"

            function ExtractFrame($line) {
              # Matches: GameGuruMAX!Func+0xNN [D:\path\file.cpp @ 123]
              $m = [regex]::Match($line, '(GameGuruMAX!\S+)\s+\[([A-Za-z]:\\.+?)\s+@\s+(\d+)\]')
              if ($m.Success) {
                $func = $m.Groups[1].Value
                $path = $m.Groups[2].Value
                $ln   = $m.Groups[3].Value

                # Optional path shortening:
                $path = $path -replace '^.*?\\GameGuru Core\\', 'GameGuru Core\'

                return ("{0}:{1} - {2}" -f $path, $ln, $func)
              }
              return $null
            }

            $frames = New-Object System.Collections.Generic.List[string]
            foreach ($l in $lines) {
              $f = ExtractFrame $l
              if ($f -and -not $frames.Contains($f)) { [void]$frames.Add($f) }
            }

            if ($frames.Count -eq 0) {
              $body = "Crash triage complete, but no file/line frames were found in debugger output."
            } else {
              $crashSite = $frames[0]
              $topN = 8
              $top = $frames | Select-Object -First $topN

              $body = "Crash triage complete.`n`nCrash site:`n$crashSite`n`nTop frames:`n$($top -join "`n")"
            }

          } else {
            $body = "Crash triage failed - see Actions log."
          }

          $payload = @{ body = $body } | ConvertTo-Json -Compress
          Invoke-RestMethod -Uri $api -Method Post -Headers $headers -Body $payload -ContentType 'application/json'
